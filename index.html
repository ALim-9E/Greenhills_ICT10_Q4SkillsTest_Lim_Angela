<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>
    <title>Attendance Checker</title>
</head>
<body>
    
    <h1>Attendance Sheet for 10E</h1>
    <label>Select Day:</label>
    <select id="day">
        <option value="0">Monday</option>
        <option value="1">Tuesday</option>
        <option value="2">Wednesday</option>
        <option value="3">Thursday</option>
        <option value="4">Friday</option>
    </select>

    <br><br>
    <label>No. of Absences</label>
    <input type="number" id="absences" min="0" max="25">

    <br>
    <button type="button" py-click="add_absence">Submit</button>
    
    <div id="plot"></div>
    
    <py-script src="main.py"></py-script>
</body>
</html>
